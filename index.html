<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face Attendance | Mobile</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 20px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Camera Viewport */
        .camera-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
        }

        .face-overlay {
            position: absolute;
            border: 2px solid var(--primary);
            border-radius: 20px;
            width: 250px;
            height: 320px;
            pointer-events: none;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .face-overlay::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid var(--text);
            border-bottom: none;
            border-right: none;
            top: -2px;
            left: -2px;
            border-top-left-radius: 18px;
        }

        /* Controls */
        .controls {
            padding: 30px 20px 40px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-register {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            grid-column: span 2;
        }

        /* Modals/Dialogs */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        /* Status Toast */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 100px;
            background: var(--primary);
            color: white;
            font-weight: 500;
            display: none;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1><i data-lucide="shield-check"></i> Face Attendance</h1>
    </header>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="face-overlay">
            <div style="color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: auto; margin-bottom: 20px;">Position face here</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button class="btn-primary" onclick="markAttendance('in')">
                <i data-lucide="log-in"></i> Punch In
            </button>
            <button class="btn-outline" onclick="markAttendance('out')">
                <i data-lucide="log-out"></i> Punch Out
            </button>
            <button class="btn-register" onclick="showRegisterModal()">
                <i data-lucide="user-plus"></i> Register New User
            </button>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 10px;">New Registration</h2>
            <p style="color: #94a3b8; margin-bottom: 25px;">Enter your ID and Name.</p>
            <input type="text" id="userid" placeholder="Employee/Student ID">
            <input type="text" id="username" placeholder="Full Name">
            <button class="btn-primary" style="width: 100%;" onclick="registerUser()">
                Complete Registration
            </button>
            <button class="btn-outline" style="width: 100%; margin-top: 10px;" onclick="hideRegisterModal()">
                Cancel
            </button>
        </div>
    </div>


    <div id="toast" class="toast"></div>

    <canvas id="canvas"></canvas>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const API_URL = ""; // Served from the same host

        // Access Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera:", err);
                showToast("Camera access denied!");
            }
        }

        function captureImage() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        async function markAttendance(type) {
            const image = captureImage();
            showToast("Processing...");
            
            const formData = new FormData();
            formData.append('image', image);
            formData.append('action', type);

            try {
                const response = await fetch(`${API_URL}/attendance`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    showToast(data.message);
                    // Add success animation/sound here
                } else {
                    showToast(data.message);
                }
            } catch (err) {
                showToast("Server Connection Failed");
            }
        }

        function showRegisterModal() {
            document.getElementById('registerModal').style.display = 'flex';
        }

        function hideRegisterModal() {
            document.getElementById('registerModal').style.display = 'none';
        }

        async function registerUser() {
            const name = document.getElementById('username').value;
            const userid = document.getElementById('userid').value;
            if (!name || !userid) return showToast("Enter ID and Name");
            
            const image = captureImage();
            showToast("Registering...");
            
            const formData = new FormData();
            formData.append('user_id', userid);
            formData.append('name', name);
            formData.append('image', image);

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    showToast("Registered successfully!");
                    hideRegisterModal();
                } else {
                    showToast(data.detail || "Registration failed");
                }
            } catch (err) {
                showToast("Server Connection Failed");
            }
        }


        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        startCamera();
    </script>
</body>
</html>
